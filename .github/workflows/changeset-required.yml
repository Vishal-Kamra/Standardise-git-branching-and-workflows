name: Changeset Required

on:
  pull_request:
    branches:
      - release
      - "release/**"
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  require_changeset:
    name: Require Changeset file
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for .changeset/*.md in PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const hasChangeset = files.some(f => {
              const name = f.filename || "";
              if (name === ".changeset/README.md") return false;
              return name.startsWith(".changeset/") && name.endsWith(".md");
            });

            if (!hasChangeset) {
              core.setFailed(
                "Missing Changeset. Add one via: `npx changeset` (commit the generated .changeset/*.md file)."
              );
            } else {
              core.info("Changeset found.");
            }

